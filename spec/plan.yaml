      use aws_sdk_s3::Client as S3Client;
      use aws_sdk_s3::primitives::ByteStream;
      use bytes::Bytes;
      use futures::Stream;
      use std::path::Path;
      use crate::error::Hfs3Error;

      const MB: usize = 1024 * 1024;
      const GB: u64 = 1024 * 1024 * 1024;

      /// S3 operations wrapper.
      pub struct S3Ops {
          client: S3Client,
      }

      impl S3Ops {
          /// Create from AWS SDK config.
          pub async fn new(region: Option<&str>) -> Result<Self, Hfs3Error> {
              let mut config_loader = aws_config::defaults(aws_config::BehaviorVersion::latest());
              if let Some(r) = region {
                  config_loader = config_loader.region(aws_config::Region::new(r.to_string()));
              }
              let config = config_loader.load().await;
              Ok(Self {
                  client: S3Client::new(&config),
              })
          }

          /// From an existing SDK client (for testing).
          pub fn from_client(client: S3Client) -> Self {
              Self { client }
          }
      }

      /// Adaptive chunk size based on file size.
      ///   < 1 GB  ->  8 MB chunks
      ///   < 5 GB  -> 64 MB chunks
      ///   >= 5 GB -> 128 MB chunks
      pub fn chunk_size_for_file(file_size: u64) -> usize {
          if file_size < GB {
              8 * MB
          } else if file_size < 5 * GB {
              64 * MB
          } else {
              128 * MB
          }
      }
      ```

      Implement these methods on S3Ops:

      ### upload_multipart_stream
      - Takes: bucket, key, a Stream<Item=Result<Bytes, E>>, file_size: u64
      - For files < 8MB: collect all bytes, use put_object
      - For larger files:
        1. create_multipart_upload
        2. Buffer incoming stream chunks into part-sized buffers (chunk_size_for_file)
        3. upload_part for each buffer (parts are numbered 1, 2, 3, ...)
        4. complete_multipart_upload with all ETags
      - Returns: total bytes uploaded
      - On any part failure, abort_multipart_upload and return error
      - Log (tracing::info!) each part upload: "Uploaded part {n}/{est_total} ({size} bytes)"

      ### download_to_file
      - Takes: bucket, key, dest: &Path
      - get_object, write body to file
      - Create parent directories
      - Returns: bytes downloaded

      ### list_objects
      - Takes: bucket, prefix
      - Use list_objects_v2 with pagination (continuation_token)
      - Returns: Vec<(String, u64)> of (key, size) pairs
      - Filter out keys that are just the prefix itself

      ### download_all
      - Takes: bucket, prefix, dest_dir: &Path
      - list_objects, then download_to_file for each
      - Strip prefix from keys to build local paths
      - Returns: (files_count, total_bytes)

