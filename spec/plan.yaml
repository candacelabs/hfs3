      ### 1. list_repo_files

      ```rust
      use crate::types::{RepoRef, RepoType, HfFileEntry};
      use crate::error::Hfs3Error;
      use reqwest::Client;

      /// List all files in a HuggingFace repo via the REST API.
      ///
      /// API endpoints:
      ///   Models:   GET https://huggingface.co/api/models/{repo_id}/tree/{revision}
      ///   Datasets: GET https://huggingface.co/api/datasets/{repo_id}/tree/{revision}
      ///   Spaces:   GET https://huggingface.co/api/spaces/{repo_id}/tree/{revision}
      ///
      /// Query params: recursive=true
      /// Auth: Bearer {token} header if token is Some
      ///
      /// Response is JSON array of objects with fields:
      ///   { "type": "file"|"directory", "path": "...", "size": N, "oid": "..." }
      ///
      /// Filter to type=="file" only. Return Vec<HfFileEntry>.
      pub async fn list_repo_files(
          client: &Client,
          repo: &RepoRef,
          token: Option<&str>,
      ) -> Result<Vec<HfFileEntry>, Hfs3Error> {
          let api_prefix = match repo.repo_type {
              RepoType::Model => "models",
              RepoType::Dataset => "datasets",
              RepoType::Space => "spaces",
          };
          let url = format!(
              "https://huggingface.co/api/{}/{}/tree/{}",
              api_prefix, repo.repo_id, repo.revision
          );

          let mut req = client.get(&url).query(&[("recursive", "true")]);
          if let Some(t) = token {
              req = req.bearer_auth(t);
          }

          let resp = req.send().await.map_err(Hfs3Error::Http)?;
          if !resp.status().is_success() {
              return Err(Hfs3Error::HfApi(format!(
                  "HF API returned {} for {}",
                  resp.status(), url
              )));
          }

          // Parse response — array of HF tree entries
          #[derive(serde::Deserialize)]
          struct HfTreeEntry {
              #[serde(rename = "type")]
              entry_type: String,
              path: String,
              #[serde(default)]
              size: u64,
              #[serde(default)]
              oid: String,
          }

          let entries: Vec<HfTreeEntry> = resp.json().await.map_err(Hfs3Error::Http)?;

          Ok(entries
              .into_iter()
              .filter(|e| e.entry_type == "file")
              .map(|e| HfFileEntry {
                  path: e.path,
                  size: e.size,
                  oid: e.oid,
              })
              .collect())
      }
