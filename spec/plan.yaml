      /// Result of a mirror operation, serialized as JSON to stdout.
      #[derive(Debug, Serialize)]
      pub struct MirrorResult {
          pub repo_id: String,
          pub repo_type: String,
          pub bucket: String,
          pub prefix: String,
          pub files_transferred: usize,
