      use std::path::PathBuf;
      use std::str::FromStr;
      use std::fmt;
      use serde::{Serialize, Deserialize};

      /// HuggingFace repo type.
      #[derive(Debug, Clone, PartialEq, Eq, Serialize, Deserialize)]
      pub enum RepoType {
          Model,
          Dataset,
          Space,
      }

      impl fmt::Display for RepoType {
          fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
              match self {
                  RepoType::Model => write!(f, "model"),
                  RepoType::Dataset => write!(f, "dataset"),
                  RepoType::Space => write!(f, "space"),
              }
          }
      }

      impl FromStr for RepoType {
          type Err = String;
          fn from_str(s: &str) -> Result<Self, Self::Err> {
              match s {
                  "model" => Ok(RepoType::Model),
                  "dataset" => Ok(RepoType::Dataset),
                  "space" => Ok(RepoType::Space),
                  other => Err(format!("unknown repo type: {other}")),
              }
          }
      }

      /// Parsed HuggingFace repo reference.
      #[derive(Debug, Clone, PartialEq, Eq)]
      pub struct RepoRef {
          pub repo_id: String,    // e.g. "meta-llama/Llama-2-7b"
          pub repo_type: RepoType, // Model, Dataset, Space
          pub revision: String,    // git revision, default "main"
      }

      /// A single file entry from the HF tree API.
      #[derive(Debug, Clone, Serialize, Deserialize)]
      pub struct HfFileEntry {
          pub path: String,       // relative path within repo
          pub size: u64,          // file size in bytes
          pub oid: String,        // git object ID (sha256)
