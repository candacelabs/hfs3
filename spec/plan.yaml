# ============================================================
# Critical Path
# ============================================================
# A0 (scaffold) -> A3 (hf_client) -> A6 (pipeline) -> A8 (cli_wiring) -> A9 (integration_test)
# Estimated: ~6-8 hours total, ~3-4 hours on critical path

# ============================================================
# Coordinator Protocol
# ============================================================
coordinator:
  bootstrap:
    - "Read spec/plan.yaml"
    - "Read spec/contracts/agent_io.proto"
    - "Check which agent output files already exist"
    - "Determine next incomplete level"

  dispatch:
    - "For each agent in the current level, launch a worker agent"
    - "Workers run in parallel within a level"
    - "Each worker reads its agent_prompt and executes independently"

  gate:
    - "After all agents in a level complete, run the gate command"
    - "Gate must pass before advancing to next level"
    - "If gate fails, identify which agent's output is broken"

  proto_validation:
    - "At each level boundary, verify output files exist for all completed agents"
    - "Verify public API surface matches output_protos"
    - "Mismatch = hard failure, do not advance"

# ============================================================
# Hard Rules
# ============================================================
hard_rules:
  - "No agent modifies files outside its writes list"
  - "Tests are the only completion signal — not compilation, not self-report"
  - "Proto contracts in spec/contracts/ are never modified by worker agents"
  - "The coordinator never writes application code"
  - "File ownership is exclusive — no file appears in two agents' writes"
  - "All commands go through just (justfile is the standard interface)"
  - "Human progress to stderr, JSON summary to stdout"
  - "No unsafe Rust unless absolutely necessary (document why)"
  - "All public functions have doc comments"
  - "Error handling: use Hfs3Error variants, no unwrap() in non-test code"

# ============================================================
# Post-Completion
# ============================================================
post_completion:
  - "Run full test suite: just test"
  - "Run integration test: just test-integration (requires network)"
  - "Run clippy: just clippy"
  - "Run fmt check: just fmt-check"
  - "Verify: cargo run -- --help"
  - "Verify: cargo run -- mirror --help"
  - "Add test-integration recipe to justfile if not present"
  - "Update AGENTS.md if any architecture details changed"
