      ## File to write

      ### src/pipeline.rs

      This is the orchestration layer. It wires together hf, s3, and concurrency.

      ```rust
      use std::path::Path;
      use std::sync::Arc;
      use std::time::Instant;
      use tokio::sync::Semaphore;
      use crate::config::AppConfig;
      use crate::error::Hfs3Error;
      use crate::hf;
      use crate::s3::S3Ops;
      use crate::concurrency;
      use crate::types::{RepoRef, MirrorResult, PullResult};

      /// Stream an entire HF repo to S3.
      ///
      /// 1. List all files in the repo via HF REST API
      /// 2. Compute transfer plan (chunk size + concurrency from available memory)
      /// 3. For each file, stream from HF -> S3 multipart upload (zero-copy)
      /// 4. Use semaphore to limit concurrent transfers
      /// 5. Log progress to stderr, return MirrorResult for JSON output
      pub async fn mirror_repo(
          config: &AppConfig,
          repo: &RepoRef,
      ) -> Result<MirrorResult, Hfs3Error> {
          let start = Instant::now();
          let http_client = reqwest::Client::new();
          let s3_ops = S3Ops::new(config.aws_region.as_deref()).await?;

          // 1. List files
          eprintln!("Listing files in {}/{}...", repo.repo_type, repo.repo_id);
          let files = hf::list_repo_files(&http_client, repo, config.hf_token.as_deref()).await?;
          eprintln!("Found {} files", files.len());

          if files.is_empty() {
              return Ok(MirrorResult {
                  repo_id: repo.repo_id.clone(),
                  repo_type: repo.repo_type.to_string(),
                  bucket: config.s3_bucket.clone(),
                  prefix: config.s3_prefix_for(&repo.repo_type.to_string(), &repo.repo_id),
                  files_transferred: 0,
                  bytes_transferred: 0,
                  duration_secs: start.elapsed().as_secs_f64(),
              });
          }

          // 2. Compute transfer plan
          let file_specs: Vec<(&str, u64)> = files.iter()
              .map(|f| (f.path.as_str(), f.size))
              .collect();
          let plan = concurrency::plan_transfer(&file_specs)
              .unwrap_or_else(|_| {
                  // Fallback if /proc/meminfo unavailable
                  eprintln!("Warning: Could not read /proc/meminfo, using default concurrency=4");
                  concurrency::plan_transfer_with_memory(&file_specs, 2 * 1024 * 1024 * 1024)
              });

          eprintln!(
              "Transfer plan: {} concurrent, {} MB chunks, {} MB available RAM",
              plan.max_concurrent,
              plan.chunk_size / (1024 * 1024),
              plan.available_memory / (1024 * 1024),
          );

          // 3. Stream each file
          let s3_prefix = config.s3_prefix_for(&repo.repo_type.to_string(), &repo.repo_id);
          let semaphore = Arc::new(Semaphore::new(plan.max_concurrent));
          let s3_ops = Arc::new(s3_ops);
          let http_client = Arc::new(http_client);

          let mut handles = Vec::new();
          for file in &files {
              let sem = semaphore.clone();
              let s3 = s3_ops.clone();
              let client = http_client.clone();
              let bucket = config.s3_bucket.clone();
              let key = format!("{}/{}", s3_prefix, file.path);
              let file_path = file.path.clone();
              let file_size = file.size;
              let repo_clone = repo.clone();
              let token = config.hf_token.clone();

              let handle = tokio::spawn(async move {
                  let _permit = sem.acquire().await.unwrap();
                  eprintln!("  Streaming {} ({} bytes)...", file_path, file_size);

                  let (stream, _) = hf::download_file_stream(
                      &client, &repo_clone, &file_path, token.as_deref()
                  ).await?;

                  let bytes = s3.upload_multipart_stream(
                      &bucket, &key, stream, file_size
                  ).await?;

                  eprintln!("  Done: {} ({} bytes)", file_path, bytes);
                  Ok::<u64, Hfs3Error>(bytes)
              });
              handles.push(handle);
          }

          // Collect results
          let mut total_bytes = 0u64;
          let mut files_ok = 0usize;
          for handle in handles {
              match handle.await {
                  Ok(Ok(bytes)) => {
                      total_bytes += bytes;
                      files_ok += 1;
                  }
                  Ok(Err(e)) => {
                      eprintln!("  Error: {e}");
                  }
                  Err(e) => {
                      eprintln!("  Task panicked: {e}");
                  }
              }
          }

          Ok(MirrorResult {
              repo_id: repo.repo_id.clone(),
              repo_type: repo.repo_type.to_string(),
              bucket: config.s3_bucket.clone(),
              prefix: s3_prefix,
              files_transferred: files_ok,
              bytes_transferred: total_bytes,
              duration_secs: start.elapsed().as_secs_f64(),
          })
      }

      /// Download a mirrored repo from S3 to a local directory.
      pub async fn pull_repo(
          config: &AppConfig,
          repo: &RepoRef,
          dest: &Path,
      ) -> Result<PullResult, Hfs3Error> {
          let start = Instant::now();
          let s3_ops = S3Ops::new(config.aws_region.as_deref()).await?;
          let s3_prefix = config.s3_prefix_for(&repo.repo_type.to_string(), &repo.repo_id);

          eprintln!("Pulling s3://{}/{} to {}...", config.s3_bucket, s3_prefix, dest.display());
          let (files_downloaded, bytes_downloaded) = s3_ops
              .download_all(&config.s3_bucket, &s3_prefix, dest)
              .await?;

          eprintln!("Downloaded {} files ({} bytes)", files_downloaded, bytes_downloaded);

          Ok(PullResult {
              repo_id: repo.repo_id.clone(),
              repo_type: repo.repo_type.to_string(),
              dest: dest.to_path_buf(),
              files_downloaded,
              bytes_downloaded,
              duration_secs: start.elapsed().as_secs_f64(),
          })
      }
