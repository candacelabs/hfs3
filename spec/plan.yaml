      //! Integration tests for hfs3 HuggingFace API client.
      //!
      //! These tests hit the real HF API and require network access.
      //! Run with: cargo test --test integration_test -- --ignored
      //! Or:       just test-integration

      use hfs3::hf;
      use hfs3::types::{RepoRef, RepoType};

      /// Test repo: tiny public model with known small files.
      /// hf-internal-testing/tiny-random-bert is ~100KB total.
      const TEST_REPO: &str = "hf-internal-testing/tiny-random-bert";

      #[tokio::test]
      #[ignore] // requires network
      async fn test_list_repo_files_returns_files() {
          let client = reqwest::Client::new();
          let repo = RepoRef {
              repo_id: TEST_REPO.into(),
              repo_type: RepoType::Model,
              revision: "main".into(),
          };

          let files = hf::list_repo_files(&client, &repo, None).await.unwrap();

          assert!(!files.is_empty(), "Expected at least one file in {TEST_REPO}");

          // Should have config.json at minimum
          let has_config = files.iter().any(|f| f.path == "config.json");
          assert!(has_config, "Expected config.json in file listing");

          // All files should have non-empty paths
          for file in &files {
              assert!(!file.path.is_empty(), "File path should not be empty");
          }
      }

      #[tokio::test]
      #[ignore] // requires network
      async fn test_download_file_stream_returns_bytes() {
          let client = reqwest::Client::new();
          let repo = RepoRef {
              repo_id: TEST_REPO.into(),
              repo_type: RepoType::Model,
              revision: "main".into(),
          };

          // Download config.json — should be small JSON
          let (stream, content_length) = hf::download_file_stream(
              &client, &repo, "config.json", None
          ).await.unwrap();

          // Collect the stream
          use futures::StreamExt;
          let mut bytes = Vec::new();
          let mut stream = Box::pin(stream);
          while let Some(chunk) = stream.next().await {
              bytes.extend_from_slice(&chunk.unwrap());
          }

          assert!(!bytes.is_empty(), "Downloaded bytes should not be empty");

          // Should be valid JSON
          let parsed: serde_json::Value = serde_json::from_slice(&bytes).unwrap();
          assert!(parsed.is_object(), "config.json should be a JSON object");
      }

