      ```rust
      use clap::{Parser, Subcommand};
      use std::path::PathBuf;
      use crate::error::Hfs3Error;

      #[derive(Parser)]
      #[command(name = "hfs3", about = "Mirror HuggingFace repos to S3")]
      struct Cli {
          #[command(subcommand)]
          command: Commands,
      }

      #[derive(Subcommand)]
      enum Commands {
          /// Stream HuggingFace repo to S3
          Mirror {
              /// HF repo ID or URL (e.g. "meta-llama/Llama-2-7b")
              repo: String,
          },
          /// Download from S3 to local directory
          Pull {
              /// HF repo ID or URL
              repo: String,
              /// Local destination directory
              #[arg(long, default_value = "./repo")]
              dest: PathBuf,
          },
          /// Pull from S3, build and run Docker image
          Run {
              /// HF repo ID or URL
              repo: String,
              /// Local destination directory
              #[arg(long, default_value = "./repo")]
              dest: PathBuf,
              /// Port to expose
              #[arg(long, default_value_t = 7860)]
              port: u16,
              /// Re-download from S3 even if local dir exists
              #[arg(long)]
              force: bool,
          },
      }

      /// CLI entrypoint. Called from main.rs.
      pub async fn run() -> Result<(), Box<dyn std::error::Error>> {
          // Init tracing: human-readable to stderr, controlled by RUST_LOG
          tracing_subscriber::fmt()
              .with_env_filter(
                  tracing_subscriber::EnvFilter::try_from_default_env()
                      .unwrap_or_else(|_| "hfs3=info".parse().unwrap())
              )
              .with_writer(std::io::stderr)
              .init();

          let cli = Cli::parse();

          match cli.command {
              Commands::Mirror { repo } => cmd_mirror(&repo).await?,
              Commands::Pull { repo, dest } => cmd_pull(&repo, &dest).await?,
              Commands::Run { repo, dest, port, force } => {
                  cmd_run(&repo, &dest, port, force).await?
              }
          };

          Ok(())
      }

      async fn cmd_mirror(repo_str: &str) -> Result<(), Hfs3Error> {
          let config = crate::config::AppConfig::from_env()?;
          let repo = crate::types::parse_repo_url(repo_str)?;

          let result = crate::pipeline::mirror_repo(&config, &repo).await?;

          // JSON summary to stdout
          println!("{}", serde_json::to_string_pretty(&result).unwrap());
          Ok(())
      }

      async fn cmd_pull(repo_str: &str, dest: &PathBuf) -> Result<(), Hfs3Error> {
          let config = crate::config::AppConfig::from_env()?;
          let repo = crate::types::parse_repo_url(repo_str)?;

          let result = crate::pipeline::pull_repo(&config, &repo, dest).await?;

          println!("{}", serde_json::to_string_pretty(&result).unwrap());
          Ok(())
      }

      async fn cmd_run(
          repo_str: &str,
          dest: &PathBuf,
          port: u16,
          force: bool,
      ) -> Result<(), Hfs3Error> {
          let config = crate::config::AppConfig::from_env()?;
          let repo = crate::types::parse_repo_url(repo_str)?;

          // Pull if dir doesn't exist or --force
          if !dest.exists() || force {
              let pull_result = crate::pipeline::pull_repo(&config, &repo, dest).await?;
              eprintln!("Pulled {} files", pull_result.files_downloaded);
          }

          // Build
          let tag = format!("hfs3/{}", repo.repo_id).to_lowercase();
          eprintln!("Building Docker image {tag}...");
          crate::docker::build_image(dest, &tag).await?;

          // Run
          eprintln!("Running on port {port}...");
          crate::docker::run_image(&tag, port, None).await?;

          // JSON summary
          let result = crate::types::RunResult {
              repo_id: repo.repo_id,
              repo_type: repo.repo_type.to_string(),
              image_tag: tag,
              port,
          };
          println!("{}", serde_json::to_string_pretty(&result).unwrap());
          Ok(())
      }
      ```

