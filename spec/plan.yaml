      ### 2. download_file_stream

      ```rust
      use bytes::Bytes;
      use futures::Stream;

      /// Get a streaming byte response for a single file from HuggingFace.
      ///
      /// URL: https://huggingface.co/{repo_id}/resolve/{revision}/{path}
      /// For datasets: https://huggingface.co/datasets/{repo_id}/resolve/{revision}/{path}
      /// For spaces: https://huggingface.co/spaces/{repo_id}/resolve/{revision}/{path}
      ///
      /// Returns the response as a byte stream + content_length.
      pub async fn download_file_stream(
          client: &Client,
          repo: &RepoRef,
          file_path: &str,
          token: Option<&str>,
      ) -> Result<(impl Stream<Item = Result<Bytes, reqwest::Error>>, Option<u64>), Hfs3Error> {
          let type_prefix = match repo.repo_type {
              RepoType::Model => "",            // models have no prefix
              RepoType::Dataset => "datasets/",
              RepoType::Space => "spaces/",
          };
          let url = format!(
              "https://huggingface.co/{}{}/resolve/{}/{}",
              type_prefix, repo.repo_id, repo.revision, file_path
          );

          let mut req = client.get(&url);
          if let Some(t) = token {
              req = req.bearer_auth(t);
          }

          let resp = req.send().await.map_err(Hfs3Error::Http)?;
          if !resp.status().is_success() {
              return Err(Hfs3Error::HfApi(format!(
                  "HF download returned {} for {}",
                  resp.status(), url
              )));
          }

          let content_length = resp.content_length();
          Ok((resp.bytes_stream(), content_length))
      }
      ```

