# hfs3 Rust Rewrite — DAG Execution Plan
# Canonical source of truth for the parallel build.
# 11 agents across 5 levels.

project:
  name: hfs3
  description: |
    Rewrite of HuggingFace-to-S3 mirror tool from Python to Rust.
    Single binary with three subcommands: mirror, pull, run.
    Streaming architecture — zero-copy pipe from HF REST API to S3 multipart upload.
    Memory-aware concurrency based on /proc/meminfo.
  repo: /home/berthadev/hfs3
  binary_name: hfs3

scope:
  in:
    - Full Rust CLI replacing Python implementation
    - HF REST API client (reqwest, no HF crate)
    - Streaming HF-to-S3 multipart upload (zero intermediate files)
    - Adaptive chunk sizing (8MB / 64MB / 128MB by file size)
    - Memory-aware concurrency (/proc/meminfo)
    - S3-to-local pull with concurrent downloads
    - Docker build+run for pulled repos
    - JSON summary to stdout, human progress to stderr
    - Devcontainer with Rust toolchain
    - GitHub Actions CI with cross-compiled releases
  out:
    - Auth / multi-user
    - Web UI
    - Windows support
    - Caching / incremental sync
    - HF private repo support beyond token auth
    - S3 server-side encryption configuration
    - Any Python code remaining

stack:
  language: Rust (2021 edition)
  async_runtime: tokio (multi-threaded)
  http_client: reqwest (with stream feature)
  s3: aws-sdk-s3
  cli: clap (derive)
  serialization: serde + serde_json
  logging: tracing + tracing-subscriber
  testing: built-in (#[cfg(test)] + tokio::test)
  task_runner: just
  ci: GitHub Actions
  container: devcontainer (Rust toolchain + just + awscli)

env_vars:
  - name: HFS3_S3_BUCKET
    required: true
    description: S3 bucket for mirrored repos
  - name: HFS3_S3_PREFIX
    required: false
    default: hfs3-mirror
    description: Key prefix within the bucket
  - name: HF_TOKEN
    required: false
    description: HuggingFace auth token for gated repos
  - name: AWS_REGION
    required: false
    description: AWS region for S3 client

