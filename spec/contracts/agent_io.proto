// Proto contracts for hfs3 Rust rewrite DAG.
// These define the typed boundaries between agents.
// Each message describes the PUBLIC API SURFACE an agent produces,
// not serialized file contents.

syntax = "proto3";
package hfs3.agent;

// ============================================================
// A0: scaffold — project skeleton + build infrastructure
// ============================================================
message ScaffoldOutput {
  bool cargo_toml_exists = 1;           // Cargo.toml at repo root
  bool main_rs_compiles = 2;            // src/main.rs with empty subcommands
  bool justfile_exists = 3;             // justfile with Rust recipes
  bool devcontainer_exists = 4;         // .devcontainer/ configured
  bool gitignore_updated = 5;           // .gitignore has /target
  bool python_deleted = 6;              // src/hfs3/, pyproject.toml, etc. removed
  repeated string binary_subcommands = 7; // ["mirror", "pull", "run"]
}

// ============================================================
// A1: types — shared domain types and error types
// ============================================================
message TypesOutput {
  repeated StructDef structs = 1;
  repeated EnumDef enums = 2;
  repeated ErrorVariant errors = 3;
}

message StructDef {
  string name = 1;               // e.g. "RepoRef", "MirrorConfig"
  repeated FieldDef fields = 2;
}

message FieldDef {
  string name = 1;               // e.g. "repo_id"
  string rust_type = 2;          // e.g. "String", "RepoType"
}

message EnumDef {
  string name = 1;               // e.g. "RepoType"
  repeated string variants = 2;  // e.g. ["Model", "Dataset", "Space"]
  bool has_display = 3;          // impl Display
  bool has_from_str = 4;         // impl FromStr
}

message ErrorVariant {
  string name = 1;               // e.g. "Config"
  string description = 2;       // e.g. "Missing required env var"
}

// ============================================================
// A2: config — env var parsing
// ============================================================
message ConfigOutput {
  StructDef config_struct = 1;    // AppConfig fields
  string constructor = 2;        // "AppConfig::from_env()" signature
  repeated string env_vars = 3;  // env vars read: HFS3_S3_BUCKET, etc.
}

// ============================================================
// A3: hf_client — HuggingFace REST API client
// ============================================================
message HfClientOutput {
  repeated FnSignature functions = 1;
  repeated StructDef response_types = 2;
}

message FnSignature {
  string name = 1;               // e.g. "list_repo_files"
  string signature = 2;          // full Rust fn signature
  string description = 3;
}

// ============================================================
// A4: s3_client — S3 upload/download with streaming multipart
// ============================================================
message S3ClientOutput {
  repeated FnSignature functions = 1;
  StructDef s3_ops_struct = 2;    // S3Ops struct
  string chunk_size_fn = 3;       // adaptive chunk size function signature
}

// ============================================================
// A5: concurrency — memory-aware concurrency limiter
// ============================================================
message ConcurrencyOutput {
  FnSignature available_memory_fn = 1;     // reads /proc/meminfo
  FnSignature calculate_concurrency_fn = 2; // computes max concurrent files
  StructDef transfer_plan = 3;              // TransferPlan struct
}

// ============================================================
// A6: pipeline — streaming transfer pipeline (HF -> S3)
// ============================================================
message PipelineOutput {
  repeated FnSignature functions = 1;
  StructDef mirror_result = 2;    // MirrorResult / PullResult
  StructDef file_transfer = 3;    // FileTransfer tracking struct
}

// ============================================================
// A7: docker — build and run Docker images
// ============================================================
message DockerOutput {
  repeated FnSignature functions = 1;   // build_image, run_image
}

// ============================================================
// A8: cli — clap command definitions + orchestration
// ============================================================
message CliOutput {
  repeated string subcommands = 1;    // ["mirror", "pull", "run"]
  repeated StructDef cli_structs = 2; // MirrorArgs, PullArgs, RunArgs
  string json_output_schema = 3;     // JSON summary format
}

// ============================================================
// A9: integration_test — end-to-end test hitting real HF API
// ============================================================
message IntegrationTestOutput {
  repeated string test_names = 1;
  string hf_test_repo = 2;           // tiny public repo used
}

// ============================================================
// A10: ci — GitHub Actions workflow
// ============================================================
message CiOutput {
  string workflow_path = 1;          // .github/workflows/ci.yml
  repeated string targets = 2;      // ["linux-x86_64", "linux-aarch64"]
  bool publishes_to_releases = 3;
}
